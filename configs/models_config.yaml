# models_config.yaml
# 多模型配置模板和映射文件

# =================================================================
# A. ConfigTemplates: 定义配置基础模板
# 这些模板包含共享的平台信息、API URL和认证信息
# =================================================================
ConfigTemplates:
  # ID 1: OpenAI 平台基础配置
  OpenAI_Config:
    platform: "OpenAI"
    # 可以直接写 api_key，也可以指定从哪个环境变量读取 API Key。
    api_key: "sk-dzJKRzWyVarmzNzrsaaAlaDJOawpXxUP8V91pUwSeYbCsuLJ"
    api_key_env: "OPENAI_API_KEY"
    base_url: "https://api3.wlai.vip/v1"
    timeout: 300

  # ID 2: 云雾平台基础配置
  Yunwu_Config:
    platform: "yunwu"
    # 可以直接写 api_key，也可以指定从哪个环境变量读取 API Key。
    api_key: "sk-dzJKRzWyVarmzNzrsaaAlaDJOawpXxUP8V91pUwSeYbCsuLJ"
    api_key_env: "OPENAI_API_KEY"
    base_url: "https://api.apiplus.org/v1"
    timeout: 300
  

# =================================================================
# B. ModelMap: 将用户传入的 model_name 映射到模板，并允许参数覆盖
# =================================================================
ModelMap:
  "deepseek-r1":
    template_id: "Yunwu_Config"

  "gpt-4o":
    template_id: "Yunwu_Config"

  "gpt-5.2":
    template_id: "Yunwu_Config"
